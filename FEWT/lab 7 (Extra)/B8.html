<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
        
    <script>
        function countdown(){

                now =new date()

                nextyear=now.getFullYear()+1
                newyear=new date('january 1,${nextyear},00:00:00')

                diffe =newyear-now
                
                days = Math.floor(diffe / (1000 * 60 * 60 * 24));
                hours = Math.floor((diffe / (1000 * 60 * 60)) % 24);
                minutes = Math.floor((diffe/ (1000 * 60)) % 60);
                seconds = Math.floor((diffe / 1000) % 60);

                 document.write(`${days} Days ${hours} Hours ${minutes} Minutes ${seconds} Seconds`);

        }

        setInterval(countdown,1000)

        countdown()
    </script>
</body>
</html>
