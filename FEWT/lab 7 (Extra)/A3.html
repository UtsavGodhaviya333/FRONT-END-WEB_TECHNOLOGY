<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        number = Math.random()*10;

         document.write("random  value is :"+ Math.floor(num))  

        document.write("Floor value is :"+ Math.floor(num)) +("br/")
        document.write("ceiling value is :"+ Math.cei(num)) +("br/")
        document.write("Round value is :"+ Math.round(num))  +("br/")
        document.write("Truncate value is :"+ Math.trunc(num))
        
    </script>
</body>
</html>
