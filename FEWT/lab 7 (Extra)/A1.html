  <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        num1 = parseInt(prompt("Enter the number one :"))
        num2 = parseInt(prompt("Enter the number two :"))


        document.write("minimum number is :"+ Math.min(num1,num2)) +("<br/>")
        document.write("maximum number is :"+ Math.max(num1,num2)) +("<br/>")
        document.write("Absolute number is :"+ Math.abs(num1,num2))

    </script>
</body>
</html>
