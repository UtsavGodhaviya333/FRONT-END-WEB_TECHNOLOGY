<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      num1 = parseInt(prompt("Enter the num1 -:"));
      num2 = parseInt(prompt("Enter the num2 -:"));

      small = num1 < num2 ? num1 : num2;

      for (i = small; i >= 1; i--) {
        if (num1 % i == 0 && num2 % i == 0) {
          document.write("" + i);
          break;
        }
      }
    </script>
  </body>
</html>
