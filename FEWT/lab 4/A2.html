<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      m = parseInt(prompt("Enter the m"));
      n = parseInt(prompt("Enter the n"));

      for (i = m; i <= n; i++) {
        flag = 0;

        for (j = 1; j <= i; j++) {
          if (i % j == 0) {
            flag++;
          }
        }

        if (flag == 2) {
          document.write("" + i);
        }
      }
    </script>
  </body>
</html>
