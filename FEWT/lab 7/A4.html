<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
     <style>

        body{

            background-image: url("2.jpg");
            background-size: cover;
           
        }

        .login_page {
            width: 250px;
            height: 300px;
            margin: 100px auto;
            padding: 20px;
            background: rgb(247, 244, 244);
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
            position: relative;
        }

       

        input {
            width: 100%;
            padding: 10px;
            margin: 10px ;
            box-sizing: border-box;
            border: 2px solid rgb(10, 184, 238);
            border-radius: 5px;
        }

        button {
            width: 50%;
            padding: 10px;
            background-color: rgb(10, 184, 238);
            color: white;
            border: none;
            margin-left: 25%;
            margin-top: 25px;
            font-size: medium;
            border-radius: 5px;
            
        }

        button:hover {
            background-color: rgb(40, 193, 40);
        }

        #massage {
            text-align: center;
            margin-top: 10px;
            font-weight: bold;
            font-size: 15px;
        }
        #user_icon{
            position: absolute;
            right: 30px;
            top: 120px;
        }
        #pass_icon{
            position: absolute;
            right: 30px;
            top: 197px;
        }

    </style>


<body>

   

    <div class="login_page">

                 <div  style="text-align: center;
                        font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;  
                        font-size: 35px;
                        margin-top:20px " >
                    Login Page</div>
        </br> 
            
             <input type="text" placeholder="Enter a username"  id="name"/>
             <i  id ="user_icon" class="fa-solid fa-user"></i>

            
        </br>

             <input type="password" placeholder="Enter a password" id="pass" />
             <i id="pass_icon" class="fa-solid fa-lock"></i>

        </br>
        
             <button onclick="login_button()">Login</button>
             <p id="massage" onclick="massage()"></p>
    </div>
    

    <script>
        
          
  function login_button() {

            

            userName = document.getElementById("name").value;
            password = document.getElementById("pass").value;

            if (userName == "admin" && password == "2510")
             {
                document.getElementById("massage").innerHTML = "--- Login Successful!! ---";
                document.getElementById("massage").style.color = "green";
            }
            else {
                document.getElementById("massage").innerHTML = "--- Invalid username or password ---";
                document.getElementById("massage").style.color = "red";
            }
        }
            
    </script>
</body>
</html>
