<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .par{
            margin-top: 100px;
            font-size: 20px;
            
        }
        .par::first-line{
            margin-top: 100px;
            font-size: 25px;
            color: rgb(255, 221, 0);
        }
        .par::first-letter{
            color: red;
            font-size: 50px;
        }
        .par::selection{
            background-color: yellow;
        }
        .par:hover{
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="par">Lorem ipsum dolor sit amet consectetur adipisicing elit.<br>
         Maiores ratione quis, dicta totam nostrum tempore molestias odio,
    </div>
</body>
</html>
