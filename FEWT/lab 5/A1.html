<body>
    <script>
        array=  [10 , 40 , 80 , 100 , 5 , 40 , 60]

       max_array =array[0]

        for(i=0;i<array.length;i++){

            if(max_array < array[i]){

            }
        }

        document.write("maximum number is:"+max_array)

    </script>
