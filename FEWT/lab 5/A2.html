<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>

        array=[10,40,30,20,60,70]

        temp =0

        for(i=0;i<array.length;i++){

            for(j=i+1;j<array.length;j++){


                    if (array[i]>array[j]){

                    temp = array[i]
                    array[i]=array[j]
                    array[j]=temp

                    }

            }
        }

        document.write("ascending order :"+array)
    </script>
</body>
</html>
