<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>

         num1 =parseInt(prompt("enter the num1")); 
         num2=parseInt(prompt("enter the num2"));
       
         choise=prompt("enter the symbol :+,-,*,/")

        switch(choise){

            case '+':
            document.write("sum of number is "+(num1+num2))
            break;

            case '-':
            document.write("subtrect of number is "+(num1-num2))
            break;

            case '*':
            document.write("multi of number is "+(num1*num2))
            break;

            case '/':
            document.write("division of number is "+(num1/num2))
            break;


        }

         

    
    </script>
</body>
</html>
