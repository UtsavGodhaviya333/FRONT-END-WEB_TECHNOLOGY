<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        num1 =paraseInt(prompt("enter the num1"));
        
        isprime=false;

        for(i=2;i<math.sqrt(num1);i++){

            if(num1%2==0){
                isprime=true
                break
            }
        }

        if(!isprime){
            document.write(num1 +"is prime")
        }
        else{
            document.write(num1 +"is not prime")
        }
    </script>
</body>
</html>
